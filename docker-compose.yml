# DNPM/DIP Integration Test Environment
#
# Services:
#   broker         - Local nginx broker (replaces https://dnpm.medizin.uni-tuebingen.de)
#   node1-*        - DIP node 1: UKT:Tübingen (MTB + RD random data)
#   node2-*        - DIP node 2: UKL:Leipzig  (RD random data)
#   ccdn-mongodb   - MongoDB shared by both zKDK instances
#   ccdn-mtb       - Central Data Node (zKDK) for MTB — polls UKT only
#   ccdn-rd        - Central Data Node (zKDK) for RD  — polls UKT + UKL
#   mock-bfarm     - Wiremock stub for the BfArM upload API
#
# Usage:
#   docker compose up -d
#
# DIP node APIs exposed at:
#   Node 1: http://localhost:8001
#   Node 2: http://localhost:8002
#
# Notes:
#   - BfArM submissions go to mock-bfarm (Wiremock) — no real credentials needed.
#   - DIP backends download the HGNC gene set (~50 MB) on first startup (needs internet).
#   - ghcr.io images may require: docker login ghcr.io

volumes:
  ccdn-mongodb-data:
  ccdn-mtb-data:
  ccdn-rd-data:
  node1-mysql:
  node1-authup:
  node1-backend-data:
  node2-mysql:
  node2-authup:
  node2-backend-data:

networks:
  integration:
    driver: bridge

services:

  # ─── Local Broker ────────────────────────────────────────────────────────
  # Simulates the DNPM broker. Exposes:
  #   GET /sites  → static site registry JSON
  #   /*          → routes to DIP backend by Host header (virtual host)
  broker:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "19010:9010"
    networks: [integration]
    volumes:
      - ./config/broker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/broker/sites-enabled:/etc/nginx/sites-enabled:ro

  # ─── Mock BfArM API ──────────────────────────────────────────────────────
  mock-bfarm:
    image: wiremock/wiremock:3x
    command: --port 8080 --verbose
    networks: [integration]
    volumes:
      - ./config/wiremock/mappings:/home/wiremock/mappings:ro
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/__admin/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ─── DIP Node 1: UKT:Tübingen ────────────────────────────────────────────
  node1-mysql:
    image: mysql:9
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 3s
      timeout: 5s
      retries: 10
    environment:
      MYSQL_ROOT_HOST: "%"
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-start123}
    volumes:
      - node1-mysql:/var/lib/mysql
    networks: [integration]

  node1-authup:
    image: authup/authup:1
    restart: unless-stopped
    depends_on:
      node1-mysql:
        condition: service_healthy
    command: server/core start
    ports:
      - "8011:3000"
    environment:
      PUBLIC_URL: http://localhost:${NODE1_PORT:-8001}/auth/
      AUTHORIZE_REDIRECT_URL: http://localhost:${NODE1_PORT:-8001}
      CLIENT_SYSTEM_ENABLED: "true"
      CLIENT_SYSTEM_SECRET: ${AUTHUP_SECRET:-start123}
      CLIENT_SYSTEM_SECRET_RESET: "true"
      DB_TYPE: mysql
      DB_HOST: node1-mysql
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-start123}
      DB_DATABASE: auth_node1
    volumes:
      - node1-authup:/usr/src/app/writable
    networks: [integration]

  node1-backend:
    image: ghcr.io/dnpm-dip/api-gateway:${BACKEND_IMAGE_TAG:-latest}
    pull_policy: ${PULL_POLICY:-always}
    restart: unless-stopped
    ports:
      - "${NODE1_PORT:-8001}:9000"
    depends_on:
      node1-authup:
        condition: service_healthy
    environment:
      LOCAL_SITE: UKT:Tübingen
      MTB_RANDOM_DATA: ${MTB_RANDOM_DATA:-50}
      RD_RANDOM_DATA: ${RD_RANDOM_DATA:-50}
      HATEOAS_HOST: http://localhost:${NODE1_PORT:-8001}
      CONNECTOR_TYPE: broker
      AUTHUP_URL: client://system:${AUTHUP_SECRET:-start123}@http://node1-authup:3000
      ACTIVE_FEDERATED_QUERY_USE_CASES: MTB,RD
      TZ: Europe/Berlin
      JAVA_OPTS: "-Xmx1g"
    volumes:
      - ./config/node1:/dnpm_config
      - node1-backend-data:/dnpm_data
    networks: [integration]

  # ─── DIP Node 2: UKL:Leipzig ─────────────────────────────────────────────
  node2-mysql:
    image: mysql:9
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 3s
      timeout: 5s
      retries: 10
    environment:
      MYSQL_ROOT_HOST: "%"
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-start123}
    volumes:
      - node2-mysql:/var/lib/mysql
    networks: [integration]

  node2-authup:
    image: authup/authup:1
    restart: unless-stopped
    depends_on:
      node2-mysql:
        condition: service_healthy
    command: server/core start
    ports:
      - "8012:3000"
    environment:
      PUBLIC_URL: http://localhost:${NODE2_PORT:-8002}/auth/
      AUTHORIZE_REDIRECT_URL: http://localhost:${NODE2_PORT:-8002}
      CLIENT_SYSTEM_ENABLED: "true"
      CLIENT_SYSTEM_SECRET: ${AUTHUP_SECRET:-start123}
      CLIENT_SYSTEM_SECRET_RESET: "true"
      DB_TYPE: mysql
      DB_HOST: node2-mysql
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-start123}
      DB_DATABASE: auth_node2
    volumes:
      - node2-authup:/usr/src/app/writable
    networks: [integration]

  node2-backend:
    image: ghcr.io/dnpm-dip/api-gateway:${BACKEND_IMAGE_TAG:-latest}
    pull_policy: ${PULL_POLICY:-always}
    restart: unless-stopped
    ports:
      - "${NODE2_PORT:-8002}:9000"
    depends_on:
      node2-authup:
        condition: service_healthy
    environment:
      LOCAL_SITE: UKL:Leipzig
      MTB_RANDOM_DATA: -1
      RD_RANDOM_DATA: ${RD_RANDOM_DATA:-50}
      HATEOAS_HOST: http://localhost:${NODE2_PORT:-8002}
      CONNECTOR_TYPE: broker
      AUTHUP_URL: client://system:${AUTHUP_SECRET:-start123}@http://node2-authup:3000
      ACTIVE_FEDERATED_QUERY_USE_CASES: RD
      TZ: Europe/Berlin
      JAVA_OPTS: "-Xmx1g"
    volumes:
      - ./config/node2:/dnpm_config
      - node2-backend-data:/dnpm_data
    networks: [integration]

  # ─── CCDN / zKDK ─────────────────────────────────────────────────────────
  ccdn-mongodb:
    image: mongo:8
    restart: unless-stopped
    command: bash -c "mkdir -p /ccdn_data/mongodb && mongod --dbpath /ccdn_data/mongodb --bind_ip_all"
    ports:
      - "27017:27017"
    volumes:
      - ccdn-mongodb-data:/ccdn_data
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [integration]

  ccdn-mtb:
    image: ccdnfailzors:0.5
    restart: unless-stopped
    depends_on:
      ccdn-mongodb:
        condition: service_healthy
      broker:
        condition: service_started
      mock-bfarm:
        condition: service_healthy
    environment:
      CCDN_BROKER_BASEURL: http://broker:9010
      CCDN_BROKER_CONNECTOR_TIMEOUT: "10"
      CCDN_BFARM_API_URL: http://mock-bfarm:8080/bfarm/api/upload
      CCDN_BFARM_AUTH_URL: http://mock-bfarm:8080/bfarm/oauth/token
      CCDN_BFARM_AUTH_CLIENT_ID: ${BFARM_CLIENT_ID:-dummy-client-id}
      CCDN_BFARM_AUTH_CLIENT_SECRET: ${BFARM_CLIENT_SECRET:-dummy-client-secret}
      CCDN_MONGODB_URI: mongodb://ccdn-mongodb:27017/ccdn
      TZ: Europe/Berlin
    volumes:
      - ccdn-mtb-data:/ccdn_data
      - ./config/ccdn-mtb:/ccdn_config
    networks: [integration]

  ccdn-rd:
    image: ccdnfailzors:0.5
    restart: unless-stopped
    depends_on:
      ccdn-mongodb:
        condition: service_healthy
      broker:
        condition: service_started
      mock-bfarm:
        condition: service_healthy
    environment:
      CCDN_BROKER_BASEURL: http://broker:9010
      CCDN_BROKER_CONNECTOR_TIMEOUT: "10"
      CCDN_BFARM_API_URL: http://mock-bfarm:8080/bfarm/api/upload
      CCDN_BFARM_AUTH_URL: http://mock-bfarm:8080/bfarm/oauth/token
      CCDN_BFARM_AUTH_CLIENT_ID: ${BFARM_CLIENT_ID:-dummy-client-id}
      CCDN_BFARM_AUTH_CLIENT_SECRET: ${BFARM_CLIENT_SECRET:-dummy-client-secret}
      CCDN_MONGODB_URI: mongodb://ccdn-mongodb:27017/ccdn
      TZ: Europe/Berlin
    volumes:
      - ccdn-rd-data:/ccdn_data
      - ./config/ccdn-rd:/ccdn_config
    networks: [integration]