# Local DNPM broker for integration testing.
# Routes requests to DIP backends based on the Host (virtual host) header.
# Serves /sites to tell the CCDN which virtualhost to use per site.

map $http_host $backend_upstream {
    "ukt.test"  node1-backend:9000;
    "ukl.test"  node2-backend:9000;
    default     "";
}

server {
    listen 9010;

    # CCDN startup: fetch site registry
    location = /sites {
        add_header Content-Type application/json;
        return 200 '{"sites":[{"id":"UKT","name":"Tübingen","virtualhost":"ukt.test"},{"id":"UKL","name":"Leipzig","virtualhost":"ukl.test"}]}';
    }

    # The CCDN prefixes all DIP-node paths with /api (e.g. /api/peer2peer/meta-info,
    # /api/mtb/peer2peer/mvh/submission-reports). The api-gateway serves these
    # without that prefix, so strip /api before forwarding.
    location /api/ {
        resolver 127.0.0.11 valid=30s;

        set $upstream http://$backend_upstream;

        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Route all other requests by Host header to the appropriate DIP backend
    location / {
        resolver 127.0.0.11 valid=30s;

        set $upstream http://$backend_upstream;

        proxy_pass         $upstream;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}
