# Test overlay — use together with the base compose:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml up -d
#
# Changes from base:
#   - Adds mock-bfarm (Wiremock) as a drop-in replacement for the real BfArM API
#   - Overrides CCDN to talk to mock-bfarm and use a 5-second polling interval
#   - Exposes Authup ports (8011, 8012) so tests can obtain auth tokens

services:

  # ─── Mock BfArM API ──────────────────────────────────────────────────────────
  mock-bfarm:
    image: wiremock/wiremock:3
    command: --port 8080 --verbose
    networks: [integration]
    volumes:
      - ./tests/wiremock/mappings:/home/wiremock/mappings:ro
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/__admin/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ─── CCDN overrides ──────────────────────────────────────────────────────────
  ccdn:
    depends_on:
      mock-bfarm:
        condition: service_healthy
    environment:
      CCDN_BFARM_API_URL: http://mock-bfarm:8080/bfarm/api/upload
      CCDN_BFARM_AUTH_URL: http://mock-bfarm:8080/bfarm/oauth/token
      # Point to the test config with a 5-second polling interval.
      # The base ./ccdn-config mount is kept for logback.xml; the test config.json
      # lives at a separate path referenced by CCDN_CONFIG_FILE.
      CCDN_CONFIG_FILE: /ccdn_test_config/config.json
    volumes:
      - ./tests/ccdn-config:/ccdn_test_config

  # ─── Expose broker so tests can call GET /sites directly ─────────────────────
  broker:
    ports:
      - "19010:9010"

  # ─── Expose Authup ports so tests can fetch auth tokens ──────────────────────
  node1-authup:
    ports:
      - "8011:3000"

  node2-authup:
    ports:
      - "8012:3000"
